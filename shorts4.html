<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Homepage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="nav">
        <div class="logo">
            <img src="logo.jpg" alt="Logo">
            <h2>EVERYWEAR</h2>
        </div>
        <nav>
            <ul>
             <li><a href="index.html">Home</a></li>
             <li><a href="about.html">About</a></li>
             <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <button class="signin-btn">Sign In</button>
        <button class="cart-btn">Cart <span class="count">0</span></button>
    </div>

    <div class="product-container">
        <div class="product-card">
            <div class="product-image">
             <a href="shorts4.html">
              <div class="image">
               <img src="shorts4.jpg" alt="shorts4">
              </a>
            </div>
        </div>
    
        <div class="product-details">
            <div>
                <h2>Stüssy Stock Logo Black Shorts</h2>
                <p class="price">₱ 220</p>
                <p class="description"> Streetwear Staple. Elevate your daily look with these classic Stüssy shorts. Featuring the clean stock logo, they offer a premium, relaxed feel for the streets.</p>
                <p class="availability">availability: In Stock</p>
                <div class="actions">
                    <label for="size">Size:</label>
                    <select id="size">
                        <option>Small</option>
                        <option>Medium</option>
                        <option>Large</option>
                        <option>XL</option>
                    </select>

                    <label for="qty">Qty</label>
                    <select id="qty">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>
            </div>

            <button class="add-to-cart">+ ADD TO CART</button>
        </div>
    </div>

</body>
</html>
